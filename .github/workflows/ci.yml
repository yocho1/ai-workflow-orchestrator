name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci_test.db
      AUTH_SECRET_KEY: ci-secret-key
      OPENROUTER_MOCK: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest tests -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  sprint7-smoke:
    name: Sprint 7 Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-tests]
    env:
      DATABASE_URL: sqlite:///./ci_smoke.db
      AUTH_SECRET_KEY: ci-secret-key
      OPENROUTER_MOCK: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Apply database migrations
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../backend-ci.log 2>&1 &

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/api/v1/health > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          exit 1

      - name: Run Sprint 7 smoke script
        run: python sprint7_qa_smoke_test.py

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ci-log
          path: backend-ci.log
